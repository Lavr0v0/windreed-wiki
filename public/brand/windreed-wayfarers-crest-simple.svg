<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">The Windreed Wayfarers simplified crest</title>
  <desc id="desc">A clean circular navy crest with three wind-bent reeds, two wind lines, a compass star, and six member dots.</desc>

  <defs>
    <clipPath id="field-clip">
      <circle cx="512" cy="512" r="386"/>
    </clipPath>
  </defs>

  <g id="crest">
    <!-- The original engraved edge is retained. -->
    <circle cx="512" cy="512" r="492" fill="#0D2026"/>
    <circle cx="512" cy="512" r="470" fill="none" stroke="#D8C48E" stroke-width="14"/>
    <circle cx="512" cy="512" r="438" fill="none" stroke="#A98F53" stroke-width="3"/>
    <circle cx="512" cy="512" r="414" fill="none" stroke="#D8C48E" stroke-width="2" stroke-dasharray="2 20" stroke-linecap="round" opacity=".7"/>
    <circle cx="512" cy="512" r="386" fill="#162C33" stroke="#4E6B5C" stroke-width="6"/>

    <g clip-path="url(#field-clip)">
      <!-- A paired horizontal gesture reads clearly as wind. -->
      <path d="M164 346C296 305 404 326 526 300C649 274 739 284 860 239" fill="none" stroke="#D8C48E" stroke-width="14" stroke-linecap="round"/>
      <path d="M151 408C286 370 404 389 530 363C650 338 750 347 872 304" fill="none" stroke="#76917F" stroke-width="8" stroke-linecap="round"/>

      <!-- Three simple reeds stand for the shared name, not individual portraits. -->
      <g fill="none" stroke="#D8C48E" stroke-width="14" stroke-linecap="round">
        <path d="M384 758C384 621 379 492 354 385"/>
        <path d="M512 758C512 581 518 432 539 321"/>
        <path d="M640 758C640 626 646 518 671 420"/>
      </g>

      <g fill="#A98F53" stroke="#E8D9AE" stroke-width="4">
        <rect x="340" y="329" width="30" height="87" rx="15" transform="rotate(-11 355 372.5)"/>
        <rect x="525" y="263" width="30" height="89" rx="15" transform="rotate(8 540 307.5)"/>
        <rect x="657" y="365" width="30" height="84" rx="15" transform="rotate(12 672 407)"/>
      </g>

      <!-- One broad leaf per reed keeps the silhouette readable at icon size. -->
      <g fill="#76917F" stroke="#AFC1AE" stroke-width="3" stroke-linejoin="round">
        <path d="M385 700C326 651 288 600 258 543C327 576 370 625 387 672Z"/>
        <path d="M512 676C546 608 584 558 628 520C599 579 562 632 512 711Z"/>
        <path d="M640 705C688 646 733 606 785 580C740 629 696 671 640 735Z"/>
      </g>

      <!-- A single ground line and six dots keep the company count explicit. -->
      <path d="M250 775Q512 735 774 775" fill="none" stroke="#4E6B5C" stroke-width="10" stroke-linecap="round"/>
      <g fill="#D8C48E">
        <circle cx="337" cy="807" r="9"/>
        <circle cx="407" cy="797" r="9"/>
        <circle cx="477" cy="792" r="9"/>
        <circle cx="547" cy="792" r="9"/>
        <circle cx="617" cy="797" r="9"/>
        <circle cx="687" cy="807" r="9"/>
      </g>
    </g>

    <g transform="translate(512 172)" fill="#D8C48E">
      <path d="M0-46L10-11L0 0L-10-11Z"/>
      <path d="M46 0L11 10L0 0L11-10Z" opacity=".75"/>
      <path d="M0 46L-10 11L0 0L10 11Z" opacity=".75"/>
      <path d="M-46 0L-11-10L0 0L-11 10Z" opacity=".75"/>
      <circle r="7" fill="#F4EFE4"/>
    </g>

    <g fill="#D8C48E">
      <path d="M512 52L522 72L512 92L502 72Z"/>
      <path d="M972 512L952 522L932 512L952 502Z"/>
      <path d="M512 972L502 952L512 932L522 952Z"/>
      <path d="M52 512L72 502L92 512L72 522Z"/>
      <circle cx="276" cy="120" r="8"/>
      <circle cx="748" cy="120" r="8"/>
      <circle cx="905" cy="690" r="8"/>
      <circle cx="680" cy="920" r="8"/>
      <circle cx="344" cy="920" r="8"/>
      <circle cx="119" cy="690" r="8"/>
    </g>
  </g>
</svg>
