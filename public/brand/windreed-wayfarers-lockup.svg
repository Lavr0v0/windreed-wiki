<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">The Windreed Wayfarers logo</title>
  <desc id="desc">Horizontal logo with a circular six-reed crest, English wordmark, and Chinese name.</desc>

