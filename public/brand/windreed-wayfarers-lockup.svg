    <linearGradient id="field" x1="86" y1="80" x2="432" y2="447" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B3941"/>
      <stop offset="1" stop-color="#0D2026"/>
    </linearGradient>
    <linearGradient id="road" x1="230" y1="245" x2="290" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8C48E"/>
      <stop offset="1" stop-color="#F4EFE4"/>
