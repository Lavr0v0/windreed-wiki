<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" role="img" aria-labelledby="title desc">
  <title id="title">Windreed Wayfarers trail-symbol studies</title>
  <desc id="desc">Three trail constructions compared inside the same circular reed mark: perspective road, negative-space road, and map route.</desc>

  <defs>
    <g id="base-mark" fill="none" stroke="#16323B" stroke-linecap="round">
      <path d="M180 390C176 324 174 270 153 224" stroke-width="13"/>
      <path d="M236 398C235 305 239 226 264 174" stroke-width="15"/>
      <path d="M286 395C289 331 300 278 326 242" stroke-width="13"/>
      <g fill="#C8A45D" stroke="none">
        <ellipse cx="144" cy="202" rx="11" ry="29" transform="rotate(-20 144 202)"/>
        <ellipse cx="278" cy="148" rx="12" ry="32" transform="rotate(27 278 148)"/>
        <ellipse cx="342" cy="220" rx="11" ry="27" transform="rotate(36 342 220)"/>
      </g>
    </g>
    <g id="circle-guide" fill="none" stroke="#16323B" stroke-width="15" stroke-linecap="round">
      <path d="M357 104C300 56 212 49 143 87C64 130 35 232 66 316C100 410 205 454 300 423C380 397 431 318 424 232C423 218 420 205 416 194"/>
      <path d="M357 104C380 116 392 131 390 145C389 155 379 159 373 153C368 148 371 140 378 141"/>
    </g>
  </defs>

  <rect width="1500" height="600" fill="#FBF8F0"/>

  <!-- A: two boundaries converge into the distance. -->
  <g transform="translate(0 0)">
    <use href="#circle-guide"/>
    <use href="#base-mark"/>
    <g fill="none" stroke="#C8A45D" stroke-width="8" stroke-linecap="round">
      <path d="M302 405C309 376 305 348 322 324C340 299 372 282 402 250"/>
      <path d="M358 403C350 375 353 352 364 332C377 307 393 280 405 251"/>
    </g>
    <circle cx="404" cy="250" r="5" fill="#C8A45D"/>
    <text x="250" y="505" text-anchor="middle" fill="#16323B" font-family="Georgia, serif" font-size="27" letter-spacing="5">A · PERSPECTIVE</text>
    <text x="250" y="544" text-anchor="middle" fill="#5D696B" font-family="sans-serif" font-size="17" letter-spacing="2">双边透视小径</text>
  </g>

  <!-- B: the road is carved out of a solid terrain wedge. -->
  <g transform="translate(500 0)">
    <use href="#circle-guide"/>
    <use href="#base-mark"/>
    <path d="M292 418C309 375 300 347 323 318C344 291 380 274 407 246C393 278 375 307 368 333C361 359 374 383 363 414Z" fill="#C8A45D"/>
    <path d="M321 413C328 379 322 352 338 330C354 307 381 285 402 256C390 291 376 316 374 340C372 365 382 387 354 414Z" fill="#FBF8F0"/>
    <text x="250" y="505" text-anchor="middle" fill="#16323B" font-family="Georgia, serif" font-size="27" letter-spacing="5">B · NEGATIVE</text>
    <text x="250" y="544" text-anchor="middle" fill="#5D696B" font-family="sans-serif" font-size="17" letter-spacing="2">负形切口小径</text>
  </g>

  <!-- C: a cartographic route rather than a physical road. -->
  <g transform="translate(1000 0)">
    <use href="#circle-guide"/>
    <use href="#base-mark"/>
    <path d="M314 399C337 370 322 344 345 322C366 302 389 300 405 274" fill="none" stroke="#C8A45D" stroke-width="9" stroke-linecap="round" stroke-dasharray="1 19"/>
    <circle cx="314" cy="399" r="11" fill="#FBF8F0" stroke="#C8A45D" stroke-width="6"/>
    <path d="M405 256L416 279L405 274L394 279Z" fill="#C8A45D"/>
    <text x="250" y="505" text-anchor="middle" fill="#16323B" font-family="Georgia, serif" font-size="27" letter-spacing="5">C · ROUTE</text>
    <text x="250" y="544" text-anchor="middle" fill="#5D696B" font-family="sans-serif" font-size="17" letter-spacing="2">地图路线</text>
  </g>
</svg>
